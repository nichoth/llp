name: ref-check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ref-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: This repo must pass
        run: ./ref-check --verbose
      - name: The broken-ref fixture must fail
        run: "! ./ref-check --root fixtures/broken-ref"
